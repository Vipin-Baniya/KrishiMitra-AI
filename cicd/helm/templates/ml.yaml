{{/*
  KrishiMitra ML Engine — Kubernetes Deployment
  Includes: Deployment, Service, HPA, PDB, ServiceMonitor
*/}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ml
  namespace: {{ .Release.Namespace }}
  labels:
    app: krishimitra-ml
    version: {{ .Values.image.tag | quote }}
    environment: {{ .Values.environment }}
spec:
  replicas: {{ .Values.replicaCount.ml }}
  selector:
    matchLabels:
      app: krishimitra-ml
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app:     krishimitra-ml
        version: {{ .Values.image.tag | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   /metrics
        prometheus.io/port:   "8003"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Release.Name }}-ml
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir:
            medium: Memory     # models are loaded into RAM; no persistent writes needed
      containers:
        - name: ml-engine
          image: {{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/krishimitra-ml:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsNonRoot:             true
            runAsUser:                1001
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/models
          ports:
            - name: http
              containerPort: 8003
          env:
            - name: DB_URL
              value: postgresql://{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: postgres-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: postgres-password
            - name: REDIS_HOST
              value: {{ .Values.redis.host }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: redis-password
          resources:
            {{- toYaml .Values.resources.ml | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: 8003
            failureThreshold: 30
            periodSeconds:    5
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 0
            periodSeconds:       15
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 0
            periodSeconds:       5
            failureThreshold:    3

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ml
  namespace: {{ .Release.Namespace }}
  labels:
    app: krishimitra-ml
spec:
  selector:
    app: krishimitra-ml
  ports:
    - name: http
      port: 8003
      targetPort: 8003

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-ml-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-ml
  minReplicas: {{ .Values.autoscaling.ml.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.ml.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: {{ .Values.autoscaling.ml.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-ml-pdb
  namespace: {{ .Release.Namespace }}
spec:
  maxUnavailable: {{ .Values.podDisruptionBudget.ml.maxUnavailable }}
  selector:
    matchLabels:
      app: krishimitra-ml

{{- if .Values.monitoring.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-ml
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: krishimitra-ml
  endpoints:
    - port:     http
      path:     /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
{{- end }}
