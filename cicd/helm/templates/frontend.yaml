{{/*
  KrishiMitra Frontend — Kubernetes Deployment
  Includes: Deployment, Service, PDB
*/}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: krishimitra-frontend
    version: {{ .Values.image.tag | quote }}
    environment: {{ .Values.environment }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app: krishimitra-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app:     krishimitra-frontend
        version: {{ .Values.image.tag | quote }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Release.Name }}-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser:    101     # nginx non-root user
        runAsGroup:   101
        fsGroup:      101
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      containers:
        - name: frontend
          image: {{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/krishimitra-frontend:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsNonRoot:             true
            runAsUser:                101
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          ports:
            - name: http
              containerPort: 80
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds:       15
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 0
            periodSeconds:       5
            failureThreshold:    3

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: krishimitra-frontend
spec:
  selector:
    app: krishimitra-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-frontend-pdb
  namespace: {{ .Release.Namespace }}
spec:
  maxUnavailable: {{ .Values.podDisruptionBudget.frontend.maxUnavailable }}
  selector:
    matchLabels:
      app: krishimitra-frontend
