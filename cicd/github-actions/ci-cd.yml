name: KrishiMitra CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:       ghcr.io
  IMAGE_PREFIX:   ghcr.io/${{ github.repository_owner }}/krishimitra

# ================================================================
#  JOB 1: Backend tests + build
# ================================================================
jobs:

  backend-test:
    name: "Backend — Test & Build"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       krishimitra_test
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: krishimitra-backend
        run: ./mvnw test -Dspring.profiles.active=test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/krishimitra_test
          DB_USER: test
          DB_PASS: test
          JWT_SECRET: test-secret-key-for-ci-pipeline-only-not-prod

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: krishimitra-backend/target/surefire-reports/

      - name: Build JAR
        working-directory: krishimitra-backend
        run: ./mvnw package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: krishimitra-backend/target/*.jar
          retention-days: 1

  # ================================================================
  #  JOB 2: ML engine tests
  # ================================================================
  ml-test:
    name: "ML Engine — Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: krishimitra-ml/requirements.txt

      - name: Install dependencies
        working-directory: krishimitra-ml
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: krishimitra-ml
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_ml_engine.py -k "not TestAPI"

  # ================================================================
  #  JOB 3: Frontend tests + build
  # ================================================================
  frontend-test:
    name: "Frontend — Test & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: krishimitra-frontend/package-lock.json

      - name: Install & test
        working-directory: krishimitra-frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: krishimitra-frontend/dist/
          retention-days: 1

  # ================================================================
  #  JOB 4: Security scanning
  # ================================================================
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: [backend-test, ml-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:    fs
          scan-ref:     .
          exit-code:    "1"
          severity:     CRITICAL,HIGH
          ignore-unfixed: true

      - name: OWASP Dependency Check (backend)
        working-directory: krishimitra-backend
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml || true

  # ================================================================
  #  JOB 4b: Kubernetes manifest security linting
  # ================================================================
  k8s-security-lint:
    name: "Kubernetes Security Lint"
    runs-on: ubuntu-latest
    needs: [backend-test, ml-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Render Helm templates
        run: |
          helm template krishimitra ./cicd/helm \
            --set image.tag=ci \
            --set environment=staging \
            --set ingress.host=staging.krishimitra.in \
            --set secrets.existingSecret=krishimitra-secrets \
            --set postgresql.host=postgres \
            --set redis.host=redis \
            --set kafka.brokers=kafka:9092 \
            > /tmp/rendered-manifests.yaml

      - name: Run Polaris (policy-as-code scan)
        uses: fairwindsops/polaris/.github/actions/polaris@master
        with:
          polaris-version:    "9.2"
          config-path:        cicd/polaris-config.yaml
          kube-resource-path: /tmp/rendered-manifests.yaml

      - name: Run Trivy on rendered Kubernetes manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:  config
          scan-ref:   /tmp/rendered-manifests.yaml
          exit-code:  "1"
          severity:   CRITICAL,HIGH

  # ================================================================
  #  JOB 5: Build & push Docker images (on push to main / tags)
  # ================================================================
  docker-build:
    name: "Build & Push Images"
    runs-on: ubuntu-latest
    needs: [backend-test, ml-test, frontend-test, security-scan, k8s-security-lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, ml-engine, llm-server, frontend]
        include:
          - service: backend
            context: krishimitra-backend
            dockerfile: cicd/dockerfiles/Dockerfile.backend
          - service: ml-engine
            context: krishimitra-ml
            dockerfile: cicd/dockerfiles/Dockerfile.python
            target: production
          - service: llm-server
            context: krishimitra-llm
            dockerfile: cicd/dockerfiles/Dockerfile.python
            target: production
          - service: frontend
            context: krishimitra-frontend
            dockerfile: cicd/dockerfiles/Dockerfile.python
            target: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          target:     ${{ matrix.target || '' }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms:  linux/amd64,linux/arm64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:  ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.meta.outputs.version }}
          exit-code:  "0"      # warn only, don't fail post-build
          severity:   CRITICAL

  # ================================================================
  #  JOB 6: Deploy to Staging
  # ================================================================
  deploy-staging:
    name: "Deploy → Staging"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.krishimitra.in

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy with Helm
        run: |
          helm upgrade --install krishimitra ./cicd/helm \
            --namespace krishimitra-staging \
            --create-namespace \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set environment=staging \
            --set ingress.host=staging.krishimitra.in \
            --set replicaCount.backend=1 \
            --set replicaCount.ml=1 \
            --values ./cicd/helm/values.staging.yaml \
            --timeout 5m \
            --wait \
            --atomic

      - name: Run smoke tests
        run: |
          sleep 15
          curl -f https://staging.krishimitra.in/api/v1/health
          echo "Smoke tests passed"

  # ================================================================
  #  JOB 7: Deploy to Production (tag-triggered only)
  # ================================================================
  deploy-production:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://krishimitra.in

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Deploy with Helm (production)
        run: |
          helm upgrade --install krishimitra ./cicd/helm \
            --namespace krishimitra \
            --create-namespace \
            --set image.tag=${{ steps.version.outputs.version }} \
            --set environment=production \
            --set ingress.host=krishimitra.in \
            --set replicaCount.backend=3 \
            --set replicaCount.ml=2 \
            --values ./cicd/helm/values.production.yaml \
            --timeout 10m \
            --wait \
            --atomic

      - name: Production smoke tests
        run: |
          sleep 30
          curl -f https://krishimitra.in/api/v1/health
          curl -f https://krishimitra.in/api/v1/prices/live?commodity=Wheat
          echo "Production smoke tests passed"

      - name: Notify Slack on deploy
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Production deploy ${{ steps.version.outputs.version }} — ${{ job.status }}",
              "channel": "#krishimitra-deploys"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ================================================================
  #  JOB 8: Nightly ML retraining (scheduled)
  # ================================================================
  ml-retrain:
    name: "ML Retrain (Nightly)"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Trigger retraining via API
        run: |
          curl -X POST https://krishimitra.in/api/v1/admin/ml/retrain \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"reason": "nightly_scheduled", "commodities": ["Wheat","Soybean","Tomato","Onion"]}'
