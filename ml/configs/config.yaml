# ================================================================
#  KrishiMitra ML Engine — Master Configuration
#  Price prediction: ARIMA + LSTM + XGBoost ensemble
#  Target: 30-day ₹/quintal forecast per commodity × mandi
# ================================================================

project:
  name: "krishimitra-ml"
  version: "1.0.0"
  description: "Agricultural price prediction engine for Indian mandis"

# ── DATA ─────────────────────────────────────────────────────
data:
  raw_price_csv:        "data/raw/agmarknet_prices.csv"
  weather_csv:          "data/raw/weather_data.csv"
  arrivals_csv:         "data/raw/mandi_arrivals.csv"
  govt_events_csv:      "data/raw/govt_events.csv"      # MSP changes, export bans
  processed_dir:        "data/processed"
  features_dir:         "data/features"

  # Commodities to model (each gets its own trained ensemble)
  commodities:
    - "Wheat"
    - "Soybean"
    - "Onion"
    - "Tomato"
    - "Potato"
    - "Cotton"
    - "Maize"
    - "Gram"

  # Mandis to model per commodity
  primary_mandis:
    Wheat:    ["Indore", "Ujjain", "Dewas", "Harda", "Bhopal"]
    Soybean:  ["Indore", "Ujjain", "Vidisha", "Khandwa"]
    Onion:    ["Lasalgaon", "Indore", "Azadpur", "Nashik"]
    Tomato:   ["Bhopal", "Azadpur", "APMC Mumbai", "Kolar"]
    Potato:   ["Agra", "Kanpur", "Indore", "Azadpur"]
    Cotton:   ["Khandwa", "Akola", "Yavatmal", "Sirsa"]
    Maize:    ["Davangere", "Bellary", "Indore", "Gulbarga"]
    Gram:     ["Indore", "Latur", "Bikaner", "Gwalior"]

  # Time series config
  min_history_days:  180     # minimum days of data to train a model
  forecast_horizon:  30      # days to forecast
  validation_days:   60      # last N days held out for validation
  test_days:         30      # last N days held out for final test

# ── FEATURE ENGINEERING ──────────────────────────────────────
features:
  # Lag features (price N days ago)
  price_lags:   [1, 2, 3, 5, 7, 10, 14, 21, 28]

  # Rolling statistics
  rolling_windows: [7, 14, 21, 30]
  rolling_stats:   ["mean", "std", "min", "max", "skew"]

  # Seasonal decomposition
  seasonal_period: 7           # weekly seasonality
  annual_period:   365         # annual cycle

  # Calendar features
  calendar:
    - "day_of_week"
    - "day_of_month"
    - "week_of_year"
    - "month"
    - "quarter"
    - "is_weekend"
    - "is_holiday"             # Indian public holidays
    - "days_to_diwali"
    - "days_to_eid"
    - "days_to_holi"
    - "is_harvest_season"      # crop-specific

  # Arrival volume features
  arrivals:
    lags:    [1, 3, 7]
    rolling: [7, 14]

  # Weather features
  weather:
    vars:    ["temp_max", "temp_min", "rainfall_mm", "humidity"]
    lags:    [1, 3, 7]
    rolling: [7, 14]

  # Market features
  market:
    - "arrivals_7d_ma"         # supply signal
    - "price_volatility_14d"   # std/mean
    - "price_momentum_7d"      # percent change
    - "msp_premium"            # (price - MSP) / MSP
    - "inter_mandi_spread"     # price diff across mandis

# ── ARIMA CONFIG ─────────────────────────────────────────────
arima:
  # Auto-ARIMA search space
  auto_arima:
    start_p: 1
    max_p:   5
    start_q: 0
    max_q:   5
    d:       null              # auto-determine via ADF test
    seasonal: true
    m:       7                 # weekly seasonality
    start_P: 0
    max_P:   2
    start_Q: 0
    max_Q:   2
    D:       1
    information_criterion: "aic"
    stepwise: true             # faster than exhaustive search
    n_fits:   50
    n_jobs:   -1
  # Fallback fixed order if auto fails
  fallback_order:   [2, 1, 2]
  fallback_seasonal_order: [1, 1, 1, 7]
  # Differencing
  max_d: 2
  alpha: 0.05                  # ADF significance level

# ── LSTM CONFIG ──────────────────────────────────────────────
lstm:
  # Architecture
  sequence_length: 60          # look-back window (days)
  hidden_sizes:    [128, 64]   # stacked LSTM layers
  dropout:         0.2
  recurrent_dropout: 0.1
  dense_layers:    [32]        # fully-connected head
  output_size:     1           # single-step prediction (rolled for multi-step)

  # Training
  epochs:          100
  batch_size:      32
  learning_rate:   0.001
  patience:        15          # early stopping
  min_delta:       0.0001
  reduce_lr_patience: 8
  reduce_lr_factor: 0.5
  min_lr:          1e-6
  gradient_clip:   1.0

  # Multi-step strategy: "direct" or "recursive"
  # direct   = separate model per horizon day (faster, less error propagation)
  # recursive = one model, feed predictions back as inputs
  multistep_strategy: "direct"
  direct_horizons: [1, 3, 7, 14, 21, 30]   # only if strategy=direct

  # Normalisation
  scaler: "minmax"             # "minmax" | "standard" | "robust"

# ── XGBOOST CONFIG ───────────────────────────────────────────
xgboost:
  # Hyperparameter search space (Optuna)
  search_space:
    n_estimators:     [100, 1000]
    max_depth:        [3, 8]
    learning_rate:    [0.01, 0.3]
    subsample:        [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_weight: [1, 10]
    gamma:            [0.0, 1.0]
    reg_alpha:        [0.0, 1.0]
    reg_lambda:       [0.5, 2.0]

  # Optuna tuning
  n_trials: 50
  timeout:  1800               # 30 min max

  # Best defaults (used if tuning is skipped)
  defaults:
    n_estimators:     500
    max_depth:        5
    learning_rate:    0.05
    subsample:        0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    random_state:     42

# ── ENSEMBLE CONFIG ──────────────────────────────────────────
ensemble:
  method: "stacking"           # "stacking" | "weighted_avg" | "learned"
  # Stacking meta-learner
  meta_learner: "ridge"        # "ridge" | "lasso" | "xgboost"
  meta_alpha:   1.0

  # Weighted average fallback weights (if stacking fails)
  weights:
    arima:   0.30
    lstm:    0.45
    xgboost: 0.25

  # Confidence intervals
  ci_method: "quantile"        # "quantile" | "bootstrap"
  ci_levels: [0.80, 0.90, 0.95]
  n_bootstrap: 200

# ── EVALUATION METRICS ───────────────────────────────────────
evaluation:
  metrics:
    - "mae"                    # mean absolute error (₹/quintal)
    - "rmse"
    - "mape"                   # mean absolute percentage error
    - "smape"                  # symmetric MAPE
    - "directional_accuracy"   # % of correct up/down calls
    - "r2"
  horizons_to_eval: [1, 3, 7, 14, 21, 30]
  # Thresholds for model acceptance
  acceptance:
    mae_max_pct:  0.08         # MAE < 8% of mean price
    dir_acc_min:  0.60         # directional accuracy > 60%

# ── SERVING ──────────────────────────────────────────────────
serving:
  host: "0.0.0.0"
  port: 8003
  model_registry_dir: "models/registry"
  cache_ttl_seconds:  1800     # 30 min
  max_forecast_days:  30
  workers:            2

# ── MLflow ───────────────────────────────────────────────────
mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "krishimitra-price-prediction"
  artifact_location: "mlruns"

# ── PATHS ────────────────────────────────────────────────────
paths:
  models_dir:      "models/registry"
  logs_dir:        "logs"
  reports_dir:     "evaluation/reports"
  plots_dir:       "evaluation/plots"
