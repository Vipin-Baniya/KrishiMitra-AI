# ================================================================
#  KrishiMitra — Nginx Reverse Proxy Configuration
#  Routes:
#    /api/v1/*       → krishimitra-backend:8080
#    /actuator/*     → krishimitra-backend:8080 (internal only)
#    /               → krishimitra-frontend:80
#    /ws/*           → krishimitra-backend:8080 (WebSocket)
# ================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Permissions-Policy        "geolocation=(self)";
    server_tokens off;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr  zone=api:10m      rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m     rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=chat:10m     rate=30r/m;
    limit_conn_zone $binary_remote_addr  zone=connections:10m;

    # Upstream definitions
    upstream backend {
        server krishimitra-backend:8080;
        keepalive 32;
    }
    upstream frontend {
        server krishimitra-frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint (for load balancer)
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN:-localhost};

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        client_max_body_size 10m;

        # ── API routes → Spring Boot ─────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_conn connections 10;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        location /api/v1/ai/chat {
            limit_req zone=chat burst=10 nodelay;
            proxy_pass http://backend;
            proxy_read_timeout 30s;    # LLM can be slow
            include /etc/nginx/proxy_params;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn connections 20;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # ── Actuator — internal only ─────────────────────────
        location /actuator/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # ── WebSocket (future: live price push) ──────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── Frontend SPA ─────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
            # SPA fallback — serve index.html for all unmatched routes
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend/;
            include /etc/nginx/proxy_params;
        }

        # ── Static asset caching ─────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
