# ── loki/loki.yml ─────────────────────────────────────────────
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store:      tsdb
      object_store: filesystem
      schema:     v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period:      30d
  ingestion_rate_mb:     16
  ingestion_burst_size_mb: 32
  max_query_series:      5000

ruler:
  alertmanager_url: http://alertmanager:9093

---
# ── loki/promtail.yml ──────────────────────────────────────────
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Spring Boot logs
  - job_name: krishimitra-backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.service=krishimitra-backend"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label:  container
      - target_label:  job
        replacement:   krishimitra-backend
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s
      - regex:
          expression: '^(?P<timestamp>\S+)\s+(?P<level>\S+)\s+(?P<logger>\S+)\s+---\s+\[(?P<thread>[^\]]+)\]\s+(?P<class>\S+)\s*:\s+(?P<message>.*)'
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message

  # ML Engine logs
  - job_name: krishimitra-ml
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: label
            values: ["com.docker.compose.service=krishimitra-ml"]
    relabel_configs:
      - target_label: job
        replacement:  krishimitra-ml
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\S+)\s+(?P<level>\S+)\s+(?P<logger>\S+)\s+—\s+(?P<message>.*)'
      - labels:
          level:

  # All containers — catch-all
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service
      - source_labels: [__meta_docker_container_name]
        regex:         '/?(.*)'
        target_label:  container

---
# ── tempo/tempo.yml ────────────────────────────────────────────
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period:  10s

compactor:
  compaction:
    block_retention: 336h   # 14 days

metrics_generator:
  registry:
    external_labels:
      source:  tempo
      cluster: krishimitra
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
