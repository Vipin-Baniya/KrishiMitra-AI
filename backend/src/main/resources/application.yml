spring:
  application:
    name: krishimitra-backend

  # ── Database ─────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: -1   # start pool lazily; don't fail if DB not yet available

  jpa:
    hibernate:
      ddl-auto: none              # Flyway owns schema — never let Hibernate touch it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: 10             # retry up to 10 times when DB not ready at startup
    connect-retries-interval: 10    # wait 10 s between retries (100 s total window)

  # ── Redis ─────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 1800000       # 30 min default TTL (ms)
      cache-null-values: false

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: krishimitra-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.krishimitra.dto.*,com.krishimitra.kafka.*"
    listener:
      missing-topics-fatal: false   # don't fail startup if Kafka topics aren't created yet
    topics:
      price-updates: krishimitra.price-updates
      sell-alerts:   krishimitra.sell-alerts
      price-ingested: krishimitra.price-ingested
      model-retrain:  krishimitra.model-retrain

  # ── Jackson ───────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ── Server ───────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain
  error:
    include-message: never        # never leak internal messages to client
    include-stacktrace: never

# ── Actuator / Metrics ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# ── App-specific config ───────────────────────────────────────
krishimitra:

  # JWT
  jwt:
    secret: ${JWT_SECRET:replace-this-in-production-with-256bit-secret-key-min}
    expiry-ms: 86400000           # 24 hours
    refresh-expiry-ms: 604800000  # 7 days

  # ML Engine (Python FastAPI)
  ml-engine:
    base-url: ${ML_ENGINE_URL:http://localhost:8003}
    connect-timeout-ms: 2000
    read-timeout-ms: 5000
    retry-attempts: 2

  # LLM Inference (Python FastAPI)
  llm-engine:
    base-url: ${LLM_ENGINE_URL:http://localhost:8001}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000

  # Agmarknet data ingestion
  agmarknet:
    api-key: ${DATAGOV_API_KEY:your-key-here}
    base-url: https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070
    ingest-schedule: "0 30 5 * * *"    # 5:30 AM daily (after mandi close)
    page-size: 100

  # Alert engine
  alerts:
    price-change-threshold-pct: 5.0   # alert if price moves > 5%
    min-gain-threshold-inr: 150       # minimum ₹/qtl gain to trigger WAIT alert

  # Rate limiting (requests per minute per user)
  rate-limit:
    requests-per-minute: 60
    burst-capacity: 20

---
# ── PRODUCTION PROFILE ────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
  data:
    redis:
      ssl:
        enabled: true

server:
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    root: WARN
    com.krishimitra: INFO

---
# ── TEST PROFILE ──────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  flyway:
    enabled: true
  jpa:
    show-sql: true

krishimitra:
  jwt:
    secret: test-secret-key-for-testing-only-not-production
    expiry-ms: 3600000

  # ── Twilio — SMS + WhatsApp alerts (Fix #12) ──────────────────
  twilio:
    account-sid:   ${TWILIO_ACCOUNT_SID:}
    auth-token:    ${TWILIO_AUTH_TOKEN:}
    sms-from:      ${TWILIO_SMS_FROM:}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

  # ── Firebase FCM — Android push notifications (Fix #12) ───────
  fcm:
    project-id:           ${FCM_PROJECT_ID:}
    service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:/app/config/firebase-service-account.json}

